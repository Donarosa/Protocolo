<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Training Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0f0f0f; margin: 0; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    @keyframes checkPop {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes slideDown {
      from { max-height: 0; opacity: 0; }
      to { max-height: 2000px; opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .check-animate { animation: checkPop 0.3s ease-out; }
    .slide-down { animation: slideDown 0.3s ease-out; overflow: hidden; }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    .tag-clave {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f0f0f',
            surface: '#1a1a1a',
            surfaceLight: '#242424',
            funcional: '#3b82f6',
            trail: '#22c55e',
            fuerza: '#f97316',
            descanso: '#6b7280',
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ─── EXERCISE IMAGES MAP ────────────────────────────────────────────
    const EXERCISE_IMAGES = {
      '90/90 Breathing': 'images/90_90_breathing.png',
      'Pelvic Tilts': 'images/pelvic_tilts.png',
      '90/90 Rotations': 'images/90_90_rotations.png',
      'Wall Hamstring Stretch': 'images/wall_hamstring_stretch.png',
      'Thoracic Extension foam roller': 'images/thoracic_extension.png',
      'Open Books': 'images/open_books.jpeg',
      'Wall Angels': 'images/wall_angels.png',
      'Elevaciones de talon sentado con peso': 'images/excentrico_soleo.png',
      'Excentrico de soleo en escalon': 'images/excentrico_soleo_escalon.png',
      'Tibial con pelota': 'images/tibial_anterior.png',
      'Tibial Anterior con banda': 'images/tibial_anterior_banda.png',
      'Tibial contra pared': 'images/tibial_contra_pared.png',
      'Tibial Anterior banda': 'images/tibial_anterior_banda.png',
      'Movilidad tobillos': 'images/movilidad_tobillos.png',
      'Elevaciones talon doble': 'images/elevaciones_talon.png',
      'Couch Stretch': 'images/couch_stretch.webp',
      'Hip Thrust con pesa rusa': 'images/hip_thrust.png',
      'Single Leg RDL con pesa rusa': 'images/single_leg_rdl.png',
      'Clamshells con banda': 'images/clamshells.png',
      'Prone Windshield Wipers': 'images/prone_windshield_wipers.png',
      'Dead Bug modificado': 'images/dead_bug.png',
      'Dead Bug': 'images/dead_bug.png',
      'Y-Raises en piso': 'images/y_raises.png',
      'Y-Raises piso': 'images/y_raises.png',
      'Face Pulls con banda': 'images/face_pulls.png',
      'Face Pulls banda': 'images/face_pulls.png',
      'Face Pulls banda cargados': 'images/face_pulls.png',
      'Good Morning con palo': 'images/good_morning.png',
      'Hip Hinge Drill': 'images/hip_hinge_drill.jpeg',
      'Equilibrio en un pie': 'images/equilibrio.png',
      'Liberacion tibial 1': 'images/liberacion_tibial_1.png',
      'Liberacion tibial 2': 'images/liberacion_tibial_2.png',
      'Liberacion tibial 3': 'images/liberacion_tibial_3.png',
      'Liberacion tibial 4': 'images/liberacion_tibial_4.png',
    };

    // ─── DATA ───────────────────────────────────────────────────────────
    const PROTOCOLS = {
      diario: {
        name: 'Protocolo Diario',
        duration: '30 min',
        blocks: [
          {
            name: 'Bloque A — Respiracion + Pelvis',
            time: '5 min',
            exercises: [
              { id: 'da1', name: '90/90 Breathing', detail: '4 respiraciones por lado' },
              { id: 'da2', name: 'Pelvic Tilts', detail: '20 reps lentos' },
              { id: 'da3', name: 'Chin-Tuck + Elongacion Axial', detail: '8 reps x 5 seg', timer: 5 },
            ]
          },
          {
            name: 'Bloque B — Cadera + Isquios',
            time: '8 min',
            exercises: [
              { id: 'db1', name: 'Couch Stretch', detail: '50 seg por pierna', clave: 'LUMBAR', timer: 50 },
              { id: 'db2', name: 'Hip CARs', detail: '2 reps por pierna' },
              { id: 'db3', name: '90/90 Rotations', detail: '6 reps por lado' },
              { id: 'db4', name: 'Wall Hamstring Stretch', detail: '45 seg por pierna', timer: 45 },
            ]
          },
          {
            name: 'Bloque C — Toracica + Postura',
            time: '7 min',
            exercises: [
              { id: 'dc1', name: 'Thoracic Extension foam roller', detail: '2 x 8 reps' },
              { id: 'dc2', name: 'Open Books', detail: '6 reps por lado' },
              { id: 'dc3', name: 'Wall Angels', detail: '2 x 10 reps' },
              { id: 'dc4', name: 'Face Pulls con banda', detail: '2 x 12 reps', clave: 'CIFOSIS' },
            ]
          },
          {
            name: 'Bloque D — Fuerza Postural',
            time: '5 min',
            exercises: [
              { id: 'dd1', name: 'Y-Raises en piso', detail: '2 x 10 reps' },
              { id: 'dd2', name: 'Dead Bug modificado', detail: '6 reps por lado' },
            ]
          },
          {
            name: 'Bloque E — Pierna + Nervio Tibial',
            time: '5 min',
            exercises: [
              { id: 'de1', name: 'Elevaciones de talon sentado con peso', detail: '2 x 10 reps' },
              { id: 'de1b', name: 'Excentrico de soleo en escalon', detail: '3 x 10 reps' },
              { id: 'de2', name: 'Tibial con pelota', detail: '2 x 15 reps' },
              { id: 'de2b', name: 'Tibial Anterior con banda', detail: '3 x 15 reps' },
              { id: 'de2c', name: 'Tibial contra pared', detail: '2 x 10 reps' },
              { id: 'de3a', name: 'Liberacion tibial 1', detail: '10 reps - Girar tobillo hacia afuera y volver', clave: 'ADORMECIMIENTO' },
              { id: 'de3b', name: 'Liberacion tibial 2', detail: '10 reps' },
              { id: 'de3c', name: 'Liberacion tibial 3', detail: '10 reps - Estirar pie, doblar rodilla' },
              { id: 'de3d', name: 'Liberacion tibial 4', detail: '10 reps - Levantar pierna, bajar flexionada' },
            ]
          },
        ]
      },
      fuerzaCasa: {
        name: 'Fuerza Estructural Casa',
        duration: '20 min',
        blocks: [{
          name: 'Fuerza',
          time: '20 min',
          exercises: [
            { id: 'fc1', name: 'Hip Thrust con pesa rusa', detail: '4 x 10', clave: 'PRIORIDAD 1' },
            { id: 'fc2', name: 'Single Leg RDL con pesa rusa', detail: '3 x 8 por lado' },
            { id: 'fc3', name: 'Dominadas agarre neutro', detail: '3 x maximo' },
            { id: 'fc4', name: 'Face Pulls banda cargados', detail: '3 x 15' },
            { id: 'fc5', name: 'Clamshells con banda', detail: '3 x 15 por lado' },
          ]
        }]
      },
    };

    const DAYS_CONFIG = [
      { key: 'lun', label: 'Lunes', type: 'fuerza', typeName: 'Protocolo + Fuerza', protocols: ['diario', 'fuerzaCasa'] },
      { key: 'mar', label: 'Martes', type: 'funcional', typeName: 'Protocolo', protocols: ['diario'] },
      { key: 'mie', label: 'Miercoles', type: 'fuerza', typeName: 'Protocolo + Fuerza', protocols: ['diario', 'fuerzaCasa'] },
      { key: 'jue', label: 'Jueves', type: 'funcional', typeName: 'Protocolo', protocols: ['diario'] },
      { key: 'vie', label: 'Viernes', type: 'fuerza', typeName: 'Protocolo + Fuerza', protocols: ['diario', 'fuerzaCasa'] },
      { key: 'sab', label: 'Sabado', type: 'fuerza', typeName: 'Protocolo + Fuerza', protocols: ['diario', 'fuerzaCasa'] },
      { key: 'dom', label: 'Domingo', type: 'descanso', typeName: 'A eleccion', protocols: ['diario'] },
    ];

    const TYPE_COLORS = {
      funcional: { bg: 'bg-funcional/10', border: 'border-funcional/30', text: 'text-funcional', dot: 'bg-funcional', ring: 'ring-funcional/30' },
      trail: { bg: 'bg-trail/10', border: 'border-trail/30', text: 'text-trail', dot: 'bg-trail', ring: 'ring-trail/30' },
      fuerza: { bg: 'bg-fuerza/10', border: 'border-fuerza/30', text: 'text-fuerza', dot: 'bg-fuerza', ring: 'ring-fuerza/30' },
      descanso: { bg: 'bg-descanso/10', border: 'border-descanso/30', text: 'text-descanso', dot: 'bg-descanso', ring: 'ring-descanso/30' },
      mixed: { bg: 'bg-fuerza/10', border: 'border-fuerza/30', text: 'text-fuerza', dot: 'bg-fuerza', ring: 'ring-fuerza/30' },
    };

    // ─── HELPERS ─────────────────────────────────────────────────────────
    function getWeekKey() {
      const now = new Date();
      const jan1 = new Date(now.getFullYear(), 0, 1);
      const days = Math.floor((now - jan1) / 86400000);
      const week = Math.ceil((days + jan1.getDay() + 1) / 7);
      return `${now.getFullYear()}-W${String(week).padStart(2, '0')}`;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem('trail-tracker-state');
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }

    function saveState(state) {
      localStorage.setItem('trail-tracker-state', JSON.stringify(state));
    }

    function getWeekState(state, weekKey) {
      return state[weekKey] || {};
    }

    function getAllExerciseIds(protocolKeys) {
      const ids = [];
      protocolKeys.forEach(pk => {
        const p = PROTOCOLS[pk];
        if (p) p.blocks.forEach(b => b.exercises.forEach(e => ids.push(e.id)));
      });
      return ids;
    }

    function getDayCompletion(dayChecks, protocolKeys) {
      const ids = getAllExerciseIds(protocolKeys);
      if (ids.length === 0) return 0;
      const done = ids.filter(id => dayChecks[id]).length;
      return Math.round((done / ids.length) * 100);
    }

    function getProtocolCompletion(dayChecks, protocolKey) {
      const p = PROTOCOLS[protocolKey];
      if (!p) return 0;
      const ids = [];
      p.blocks.forEach(b => b.exercises.forEach(e => ids.push(e.id)));
      if (ids.length === 0) return 0;
      const done = ids.filter(id => dayChecks[id]).length;
      return Math.round((done / ids.length) * 100);
    }

    function isProtocolComplete(dayChecks, protocolKey) {
      return getProtocolCompletion(dayChecks, protocolKey) === 100;
    }

    function getStreak(state, weekKey) {
      const weekData = getWeekState(state, weekKey);
      let streak = 0;
      const today = new Date().getDay();
      const dayIndex = today === 0 ? 6 : today - 1;
      for (let i = dayIndex; i >= 0; i--) {
        const dayConfig = DAYS_CONFIG[i];
        const dayChecks = weekData[dayConfig.key] || {};
        const hasFullProtocol = dayConfig.protocols.some(pk => isProtocolComplete(dayChecks, pk));
        if (hasFullProtocol) streak++;
        else break;
      }
      return streak;
    }

    // ─── TIMER COMPONENT ────────────────────────────────────────────────
    function Timer({ seconds: initialSeconds }) {
      const [active, setActive] = useState(false);
      const [time, setTime] = useState(initialSeconds);
      const intervalRef = useRef(null);

      useEffect(() => {
        if (active && time > 0) {
          intervalRef.current = setInterval(() => setTime(t => t - 1), 1000);
        } else {
          clearInterval(intervalRef.current);
          if (active && time === 0) {
            setActive(false);
            try { navigator.vibrate?.(200); } catch {}
          }
        }
        return () => clearInterval(intervalRef.current);
      }, [active, time]);

      const reset = () => { setActive(false); setTime(initialSeconds); };
      const toggle = () => {
        if (time === 0) { setTime(initialSeconds); setActive(true); }
        else setActive(!active);
      };

      const mins = Math.floor(time / 60);
      const secs = time % 60;
      const pct = ((initialSeconds - time) / initialSeconds) * 100;

      return (
        <div className="flex items-center gap-2 mt-1.5">
          <button onClick={toggle}
            className={`flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium transition-all ${
              active ? 'bg-red-500/20 text-red-400 ring-1 ring-red-500/30' :
              time === 0 ? 'bg-green-500/20 text-green-400 ring-1 ring-green-500/30' :
              'bg-white/5 text-gray-400 hover:bg-white/10'
            }`}>
            {active ? (
              <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><rect x="5" y="4" width="3" height="12" rx="1"/><rect x="12" y="4" width="3" height="12" rx="1"/></svg>
            ) : time === 0 ? (
              <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/></svg>
            ) : (
              <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
            )}
            <span className="font-mono tabular-nums">
              {mins > 0 ? `${mins}:${String(secs).padStart(2, '0')}` : `${secs}s`}
            </span>
          </button>
          {(active || time < initialSeconds) && (
            <button onClick={reset} className="text-gray-500 hover:text-gray-300 transition-colors">
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
            </button>
          )}
          {active && (
            <div className="flex-1 h-1 bg-white/5 rounded-full overflow-hidden max-w-[80px]">
              <div className="h-full bg-funcional/60 rounded-full transition-all duration-1000" style={{ width: `${pct}%` }}/>
            </div>
          )}
        </div>
      );
    }

    // ─── EXERCISE CHECKBOX ──────────────────────────────────────────────
    function ExerciseItem({ exercise, checked, onToggle }) {
      const [justChecked, setJustChecked] = useState(false);
      const [showImage, setShowImage] = useState(false);
      const imageSrc = EXERCISE_IMAGES[exercise.name];

      const handleToggle = () => {
        if (!checked) setJustChecked(true);
        onToggle(exercise.id);
      };

      useEffect(() => {
        if (justChecked) {
          const t = setTimeout(() => setJustChecked(false), 300);
          return () => clearTimeout(t);
        }
      }, [justChecked]);

      return (
        <div className={`py-2.5 px-3 rounded-lg transition-all ${checked ? 'bg-white/[0.02]' : 'hover:bg-white/[0.03]'}`}>
          <div className="flex items-start gap-3">
            <button onClick={handleToggle} className="mt-0.5 flex-shrink-0">
              <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all ${
                checked ? 'bg-green-500 border-green-500' : 'border-gray-600 hover:border-gray-400'
              }`}>
                {checked && (
                  <svg className={`w-3 h-3 text-white ${justChecked ? 'check-animate' : ''}`} fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                )}
              </div>
            </button>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                <span className={`text-sm font-medium transition-all ${checked ? 'text-gray-500 line-through' : 'text-gray-200'}`}>
                  {exercise.name}
                </span>
                {exercise.clave && <span className="tag-clave">CLAVE: {exercise.clave}</span>}
                {imageSrc && (
                  <button onClick={() => setShowImage(!showImage)}
                    className={`w-5 h-5 rounded flex items-center justify-center transition-all ${showImage ? 'bg-blue-500/30 text-blue-400' : 'bg-white/5 text-gray-500 hover:text-gray-300'}`}
                    title="Ver imagen">
                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                  </button>
                )}
              </div>
              <span className={`text-xs ${checked ? 'text-gray-600' : 'text-gray-500'}`}>{exercise.detail}</span>
              {exercise.timer && !checked && <Timer seconds={exercise.timer} />}
            </div>
          </div>
          {showImage && imageSrc && (
            <div className="mt-2 ml-8 rounded-lg overflow-hidden border border-white/10 fade-in">
              <img src={imageSrc} alt={exercise.name} className="w-full max-w-xs object-contain bg-white/5" loading="lazy" />
            </div>
          )}
        </div>
      );
    }

    // ─── PROTOCOL SECTION ───────────────────────────────────────────────
    function ProtocolSection({ protocolKey, dayChecks, onToggle }) {
      const [expanded, setExpanded] = useState(true);
      const protocol = PROTOCOLS[protocolKey];
      if (!protocol) return null;

      const completion = getProtocolCompletion(dayChecks, protocolKey);
      const complete = completion === 100;

      return (
        <div className={`rounded-xl border transition-all ${complete ? 'border-green-500/20 bg-green-500/[0.03]' : 'border-white/5 bg-surface'}`}>
          <button onClick={() => setExpanded(!expanded)}
            className="w-full flex items-center justify-between p-4">
            <div className="flex items-center gap-3">
              <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-xs font-bold ${
                complete ? 'bg-green-500/20 text-green-400' : 'bg-white/5 text-gray-400'
              }`}>
                {complete ? (
                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
                ) : `${completion}%`}
              </div>
              <div className="text-left">
                <div className={`text-sm font-semibold ${complete ? 'text-green-400' : 'text-gray-200'}`}>
                  {protocol.name}
                </div>
                <div className="text-xs text-gray-500">{protocol.duration}</div>
              </div>
            </div>
            <svg className={`w-4 h-4 text-gray-500 transition-transform ${expanded ? 'rotate-180' : ''}`}
              fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          {expanded && (
            <div className="px-3 pb-3 slide-down">
              {/* Progress bar */}
              <div className="mx-1 mb-3 h-1 bg-white/5 rounded-full overflow-hidden">
                <div className="h-full bg-green-500/60 rounded-full transition-all duration-500" style={{ width: `${completion}%` }}/>
              </div>
              {protocol.blocks.map((block, bi) => (
                <div key={bi} className="mb-2">
                  <div className="flex items-center gap-2 px-3 py-1.5">
                    <span className="text-[10px] font-bold text-gray-500 uppercase tracking-wider">{block.name}</span>
                    <span className="text-[10px] text-gray-600">({block.time})</span>
                  </div>
                  {block.exercises.map(ex => (
                    <ExerciseItem key={ex.id} exercise={ex} checked={!!dayChecks[ex.id]} onToggle={onToggle} />
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── DAY CARD (WEEK VIEW) ───────────────────────────────────────────
    function DayCard({ dayConfig, dayChecks, isToday, onClick }) {
      const protocols = dayConfig.protocols;
      const completion = getDayCompletion(dayChecks, protocols);
      const colors = TYPE_COLORS[dayConfig.type] || TYPE_COLORS.descanso;

      return (
        <button onClick={onClick}
          className={`relative w-full text-left p-3.5 rounded-xl border transition-all hover:scale-[1.02] active:scale-[0.98] ${
            isToday ? `${colors.bg} ${colors.border} border ring-1 ${colors.ring}` : 'bg-surface border-white/5 hover:border-white/10'
          }`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <div className={`w-2 h-2 rounded-full ${colors.dot}`}/>
              <span className={`text-xs font-bold uppercase tracking-wider ${isToday ? colors.text : 'text-gray-400'}`}>
                {dayConfig.label}
              </span>
            </div>
            {isToday && <span className="text-[9px] font-bold text-gray-500 bg-white/5 px-1.5 py-0.5 rounded">HOY</span>}
          </div>
          <div className={`text-[11px] font-medium mb-3 ${colors.text} opacity-70`}>
            {dayConfig.typeName}
          </div>
          {/* Mini protocol indicators */}
          <div className="flex gap-1 mb-3">
            {protocols.map(pk => {
              const pComplete = isProtocolComplete(dayChecks, pk);
              const pPct = getProtocolCompletion(dayChecks, pk);
              return (
                <div key={pk} className={`h-1.5 flex-1 rounded-full ${
                  pComplete ? 'bg-green-500/60' : pPct > 0 ? 'bg-yellow-500/40' : 'bg-white/10'
                }`}/>
              );
            })}
          </div>
          {/* Completion */}
          <div className="flex items-center justify-between">
            <div className="w-full bg-white/5 rounded-full h-1.5 overflow-hidden">
              <div className={`h-full rounded-full transition-all duration-700 ${
                completion === 100 ? 'bg-green-500' : completion > 0 ? 'bg-yellow-500/60' : 'bg-white/5'
              }`} style={{ width: `${completion}%` }}/>
            </div>
            <span className={`text-xs font-bold ml-2 tabular-nums ${
              completion === 100 ? 'text-green-400' : completion > 0 ? 'text-yellow-500' : 'text-gray-600'
            }`}>{completion}%</span>
          </div>
        </button>
      );
    }

    // ─── DAY DETAIL VIEW ────────────────────────────────────────────────
    function DayDetail({ dayIndex, state, weekKey, setState, onBack }) {
      const dayConfig = DAYS_CONFIG[dayIndex];
      const weekData = getWeekState(state, weekKey);
      const dayChecks = weekData[dayConfig.key] || {};
      const notes = weekData[`${dayConfig.key}_notes`] || '';
      const protocols = dayConfig.protocols;
      const colors = TYPE_COLORS[dayConfig.type] || TYPE_COLORS.descanso;
      const completion = getDayCompletion(dayChecks, protocols);

      const toggleExercise = (exId) => {
        const newState = { ...state };
        if (!newState[weekKey]) newState[weekKey] = {};
        if (!newState[weekKey][dayConfig.key]) newState[weekKey][dayConfig.key] = {};
        newState[weekKey][dayConfig.key][exId] = !newState[weekKey][dayConfig.key][exId];
        setState(newState);
        saveState(newState);
      };

      const resetDay = () => {
        const newState = { ...state };
        if (newState[weekKey]) {
          newState[weekKey][dayConfig.key] = {};
        }
        setState(newState);
        saveState(newState);
      };

      const updateNotes = (text) => {
        const newState = { ...state };
        if (!newState[weekKey]) newState[weekKey] = {};
        newState[weekKey][`${dayConfig.key}_notes`] = text;
        setState(newState);
        saveState(newState);
      };

      return (
        <div className="fade-in">
          {/* Header */}
          <div className="flex items-center gap-3 mb-6">
            <button onClick={onBack}
              className="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors">
              <svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/>
              </svg>
            </button>
            <div className="flex-1">
              <h2 className="text-xl font-bold text-white">{dayConfig.label}</h2>
              <div className="flex items-center gap-2">
                <div className={`w-2 h-2 rounded-full ${colors.dot}`}/>
                <span className={`text-sm ${colors.text}`}>{dayConfig.typeName}</span>
                <span className="text-gray-600">·</span>
                <span className="text-sm text-gray-500">{completion}% completado</span>
              </div>
            </div>
          </div>

          {/* Overall progress */}
          <div className="mb-5">
            <div className="w-full bg-white/5 rounded-full h-2 overflow-hidden">
              <div className={`h-full rounded-full transition-all duration-700 ${
                completion === 100 ? 'bg-green-500' : 'bg-funcional/60'
              }`} style={{ width: `${completion}%` }}/>
            </div>
          </div>

          {/* Protocols */}
          <div className="space-y-3 mb-6">
            {protocols.map(pk => (
              <ProtocolSection key={pk} protocolKey={pk} dayChecks={dayChecks} onToggle={toggleExercise} />
            ))}
          </div>

          {/* Notes */}
          <div className="mb-4">
            <label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">Notas del dia</label>
            <textarea
              value={notes}
              onChange={e => updateNotes(e.target.value)}
              placeholder="Escribi tus notas aca..."
              className="w-full bg-surface border border-white/5 rounded-xl p-3 text-sm text-gray-300 placeholder-gray-600 resize-none focus:outline-none focus:border-white/20 transition-colors"
              rows={3}
            />
          </div>

          {/* Actions */}
          <div className="flex gap-3">
            <button onClick={resetDay}
              className="flex-1 py-3 rounded-xl bg-red-500/10 text-red-400 text-sm font-semibold hover:bg-red-500/20 transition-colors ring-1 ring-red-500/20">
              Resetear dia
            </button>
            <button onClick={onBack}
              className="flex-1 py-3 rounded-xl bg-white/5 text-gray-400 text-sm font-semibold hover:bg-white/10 transition-colors">
              Volver
            </button>
          </div>
        </div>
      );
    }

    // ─── PROTOCOL CATALOG INFO ─────────────────────────────────────────
    const PROTOCOL_CATALOG = [
      { key: 'diario', icon: '01', color: 'funcional', desc: 'Protocolo completo — Respiracion, movilidad, postura y nervio tibial' },
      { key: 'fuerzaCasa', icon: '02', color: 'fuerza', desc: 'Fuerza estructural — Hip thrust, RDL, dominadas' },
    ];

    // ─── PROTOCOL DETAIL (FREE / STANDALONE) ────────────────────────────
    function ProtocolFreeDetail({ protocolKey, state, weekKey, setState, onBack }) {
      const protocol = PROTOCOLS[protocolKey];
      const weekData = getWeekState(state, weekKey);
      const freeChecks = weekData._free || {};
      const checks = freeChecks[protocolKey] || {};
      const catalogItem = PROTOCOL_CATALOG.find(c => c.key === protocolKey);
      const colors = TYPE_COLORS[catalogItem?.color || 'funcional'];

      const completion = getProtocolCompletion(checks, protocolKey);

      const toggleExercise = (exId) => {
        const newState = { ...state };
        if (!newState[weekKey]) newState[weekKey] = {};
        if (!newState[weekKey]._free) newState[weekKey]._free = {};
        if (!newState[weekKey]._free[protocolKey]) newState[weekKey]._free[protocolKey] = {};
        newState[weekKey]._free[protocolKey][exId] = !newState[weekKey]._free[protocolKey][exId];
        setState(newState);
        saveState(newState);
      };

      const resetProtocol = () => {
        const newState = { ...state };
        if (newState[weekKey]?._free) {
          newState[weekKey]._free[protocolKey] = {};
        }
        setState(newState);
        saveState(newState);
      };

      return (
        <div className="fade-in">
          {/* Header */}
          <div className="flex items-center gap-3 mb-6">
            <button onClick={onBack}
              className="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors">
              <svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/>
              </svg>
            </button>
            <div className="flex-1">
              <h2 className="text-xl font-bold text-white">{protocol.name}</h2>
              <div className="flex items-center gap-2">
                <div className={`w-2 h-2 rounded-full ${colors.dot}`}/>
                <span className="text-sm text-gray-500">{protocol.duration}</span>
                <span className="text-gray-600">·</span>
                <span className={`text-sm ${completion === 100 ? 'text-green-400' : 'text-gray-500'}`}>{completion}% completado</span>
              </div>
            </div>
          </div>

          {/* Progress */}
          <div className="mb-5">
            <div className="w-full bg-white/5 rounded-full h-2 overflow-hidden">
              <div className={`h-full rounded-full transition-all duration-700 ${
                completion === 100 ? 'bg-green-500' : 'bg-funcional/60'
              }`} style={{ width: `${completion}%` }}/>
            </div>
          </div>

          {/* Exercises */}
          <div className="space-y-3 mb-6">
            <ProtocolSection protocolKey={protocolKey} dayChecks={checks} onToggle={toggleExercise} />
          </div>

          {/* Actions */}
          <div className="flex gap-3">
            <button onClick={resetProtocol}
              className="flex-1 py-3 rounded-xl bg-red-500/10 text-red-400 text-sm font-semibold hover:bg-red-500/20 transition-colors ring-1 ring-red-500/20">
              Resetear protocolo
            </button>
            <button onClick={onBack}
              className="flex-1 py-3 rounded-xl bg-white/5 text-gray-400 text-sm font-semibold hover:bg-white/10 transition-colors">
              Volver
            </button>
          </div>
        </div>
      );
    }

    // ─── PROTOCOLS CATALOG VIEW ─────────────────────────────────────────
    function ProtocolsCatalog({ state, weekKey, onSelect }) {
      const weekData = getWeekState(state, weekKey);
      const freeChecks = weekData._free || {};

      return (
        <div className="fade-in">
          <div className="mb-5">
            <h2 className="text-base font-bold text-white mb-1">Todos los protocolos</h2>
            <p className="text-xs text-gray-500">Elegi cualquier protocolo para hacerlo ahora, sin importar el dia</p>
          </div>

          <div className="space-y-2.5">
            {PROTOCOL_CATALOG.map(item => {
              const protocol = PROTOCOLS[item.key];
              const checks = freeChecks[item.key] || {};
              const completion = getProtocolCompletion(checks, item.key);
              const complete = completion === 100;
              const colors = TYPE_COLORS[item.color];
              const totalExercises = protocol.blocks.reduce((acc, b) => acc + b.exercises.length, 0);
              const doneExercises = protocol.blocks.reduce((acc, b) => acc + b.exercises.filter(e => checks[e.id]).length, 0);

              return (
                <button key={item.key} onClick={() => onSelect(item.key)}
                  className={`w-full text-left p-4 rounded-xl border transition-all hover:scale-[1.01] active:scale-[0.99] ${
                    complete ? 'border-green-500/20 bg-green-500/[0.03]' : 'bg-surface border-white/5 hover:border-white/10'
                  }`}>
                  <div className="flex items-start gap-3">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-xs font-black flex-shrink-0 ${
                      complete ? 'bg-green-500/20 text-green-400' : `${colors.bg} ${colors.text}`
                    }`}>
                      {complete ? (
                        <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>
                      ) : item.icon}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between mb-0.5">
                        <span className={`text-sm font-semibold ${complete ? 'text-green-400' : 'text-gray-200'}`}>
                          {protocol.name}
                        </span>
                        <span className={`text-xs font-bold tabular-nums ml-2 ${
                          complete ? 'text-green-400' : completion > 0 ? 'text-yellow-500' : 'text-gray-600'
                        }`}>{doneExercises}/{totalExercises}</span>
                      </div>
                      <p className="text-[11px] text-gray-500 mb-2 leading-relaxed">{item.desc}</p>
                      <div className="flex items-center gap-2">
                        <div className="flex-1 bg-white/5 rounded-full h-1.5 overflow-hidden">
                          <div className={`h-full rounded-full transition-all duration-500 ${
                            complete ? 'bg-green-500' : completion > 0 ? 'bg-yellow-500/60' : 'bg-white/5'
                          }`} style={{ width: `${completion}%` }}/>
                        </div>
                        <span className="text-[10px] text-gray-600 font-medium">{protocol.duration}</span>
                      </div>
                    </div>
                    <svg className="w-4 h-4 text-gray-600 mt-1 flex-shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/>
                    </svg>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── BOTTOM NAV ─────────────────────────────────────────────────────
    function BottomNav({ activeTab, onChangeTab }) {
      return (
        <div className="fixed bottom-0 left-0 right-0 bg-surface/95 backdrop-blur-lg border-t border-white/5 z-50">
          <div className="max-w-lg mx-auto flex">
            <button onClick={() => onChangeTab('week')}
              className={`flex-1 flex flex-col items-center gap-1 py-3 transition-colors ${
                activeTab === 'week' ? 'text-funcional' : 'text-gray-500'
              }`}>
              <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth={activeTab === 'week' ? 2.5 : 1.5} viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <span className="text-[10px] font-bold">Semana</span>
            </button>
            <button onClick={() => onChangeTab('protocols')}
              className={`flex-1 flex flex-col items-center gap-1 py-3 transition-colors ${
                activeTab === 'protocols' ? 'text-funcional' : 'text-gray-500'
              }`}>
              <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth={activeTab === 'protocols' ? 2.5 : 1.5} viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
              </svg>
              <span className="text-[10px] font-bold">Protocolos</span>
            </button>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ───────────────────────────────────────────────────────
    function App() {
      const [state, setState] = useState(loadState);
      const [selectedDay, setSelectedDay] = useState(null);
      const [activeTab, setActiveTab] = useState('week');
      const [selectedProtocol, setSelectedProtocol] = useState(null);
      const weekKey = getWeekKey();
      const weekData = getWeekState(state, weekKey);

      const today = new Date().getDay();
      const todayIndex = today === 0 ? 6 : today - 1;

      const streak = useMemo(() => getStreak(state, weekKey), [state, weekKey]);

      const totalCompletion = useMemo(() => {
        let totalEx = 0, doneEx = 0;
        DAYS_CONFIG.forEach(dc => {
          const dayChecks = weekData[dc.key] || {};
          const ids = getAllExerciseIds(dc.protocols);
          totalEx += ids.length;
          doneEx += ids.filter(id => dayChecks[id]).length;
        });
        return totalEx > 0 ? Math.round((doneEx / totalEx) * 100) : 0;
      }, [weekData]);

      const exportWeek = () => {
        let text = `=== Resumen Semana ${weekKey} ===\n\n`;
        DAYS_CONFIG.forEach(dc => {
          const dayChecks = weekData[dc.key] || {};
          const comp = getDayCompletion(dayChecks, dc.protocols);
          text += `${dc.label} (${dc.typeName}) — ${comp}%\n`;
          dc.protocols.forEach(pk => {
            const p = PROTOCOLS[pk];
            if (p) {
              const pc = getProtocolCompletion(dayChecks, pk);
              text += `  ${p.name}: ${pc}%\n`;
            }
          });
          const notes = weekData[`${dc.key}_notes`];
          if (notes) text += `  Notas: ${notes}\n`;
          text += '\n';
        });
        text += `Racha: ${streak} dias\nProgreso semanal: ${totalCompletion}%\n`;
        navigator.clipboard?.writeText(text)
          .then(() => alert('Resumen copiado al portapapeles'))
          .catch(() => {
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `semana-${weekKey}.txt`;
            a.click(); URL.revokeObjectURL(url);
          });
      };

      // Day detail view
      if (selectedDay !== null) {
        return (
          <div className="min-h-screen bg-bg text-white p-4 max-w-lg mx-auto pb-24">
            <DayDetail
              dayIndex={selectedDay}
              state={state}
              weekKey={weekKey}
              setState={setState}
              onBack={() => setSelectedDay(null)}
            />
            <BottomNav activeTab={activeTab} onChangeTab={(tab) => { setSelectedDay(null); setActiveTab(tab); }} />
          </div>
        );
      }

      // Protocol free detail view
      if (selectedProtocol !== null) {
        return (
          <div className="min-h-screen bg-bg text-white p-4 max-w-lg mx-auto pb-24">
            <ProtocolFreeDetail
              protocolKey={selectedProtocol}
              state={state}
              weekKey={weekKey}
              setState={setState}
              onBack={() => setSelectedProtocol(null)}
            />
            <BottomNav activeTab={activeTab} onChangeTab={(tab) => { setSelectedProtocol(null); setActiveTab(tab); }} />
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-bg text-white p-4 max-w-lg mx-auto pb-24">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <h1 className="text-lg font-extrabold text-white tracking-tight">Trail Training</h1>
              <p className="text-xs text-gray-500 mt-0.5">Semana {weekKey}</p>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={exportWeek}
                className="w-9 h-9 rounded-xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors"
                title="Exportar semana">
                <svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
              </button>
            </div>
          </div>

          {activeTab === 'week' ? (
            <>
              {/* Stats */}
              <div className="grid grid-cols-2 gap-3 mb-6">
                <div className="bg-surface rounded-xl p-4 border border-white/5">
                  <div className="text-xs text-gray-500 mb-1 font-medium">Racha</div>
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-3xl font-black text-white tabular-nums">{streak}</span>
                    <span className="text-xs text-gray-500">dias</span>
                  </div>
                  <div className="flex gap-0.5 mt-2">
                    {DAYS_CONFIG.map((dc, i) => {
                      const dayChecks = weekData[dc.key] || {};
                      const hasComplete = dc.protocols.some(pk => isProtocolComplete(dayChecks, pk));
                      return <div key={i} className={`h-1.5 flex-1 rounded-full ${
                        hasComplete ? 'bg-green-500/60' : i <= todayIndex ? 'bg-white/10' : 'bg-white/[0.03]'
                      }`}/>;
                    })}
                  </div>
                </div>
                <div className="bg-surface rounded-xl p-4 border border-white/5">
                  <div className="text-xs text-gray-500 mb-1 font-medium">Progreso semanal</div>
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-3xl font-black text-white tabular-nums">{totalCompletion}</span>
                    <span className="text-xs text-gray-500">%</span>
                  </div>
                  <div className="w-full bg-white/5 rounded-full h-1.5 mt-2 overflow-hidden">
                    <div className={`h-full rounded-full transition-all duration-1000 ${
                      totalCompletion === 100 ? 'bg-green-500' : 'bg-funcional/50'
                    }`} style={{ width: `${totalCompletion}%` }}/>
                  </div>
                </div>
              </div>

              {/* Week Grid */}
              <div className="space-y-2.5">
                {DAYS_CONFIG.map((dc, i) => (
                  <DayCard
                    key={dc.key}
                    dayConfig={dc}
                    dayChecks={weekData[dc.key] || {}}
                    isToday={i === todayIndex}
                    onClick={() => setSelectedDay(i)}
                  />
                ))}
              </div>
            </>
          ) : (
            <ProtocolsCatalog state={state} weekKey={weekKey} onSelect={setSelectedProtocol} />
          )}

          {/* Footer */}
          <div className="mt-8 text-center text-[10px] text-gray-700">
            Protocolo Completo · Trail Running + Cifosis Estructural
          </div>

          <BottomNav activeTab={activeTab} onChangeTab={setActiveTab} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
